services:
  whale:
    build: .
    image: whale-cli:0.3.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WHALE_PORT:-8765}:8765"
    environment:
      STEP_API_KEY: ${STEP_API_KEY:-}
      STEPFUN_API_KEY: ${STEPFUN_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-step-3.7-flash}
      WHALE_HOME: /data
      WHALE_WORKSPACE: /workspace
    volumes:
      - whale-data:/data
      - ${WHALE_WORKSPACE_PATH:-.}:/workspace
    read_only: true
    tmpfs:
      - /tmp

volumes:
  whale-data:
