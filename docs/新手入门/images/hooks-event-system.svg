<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">Hooks 事件系统</title>
  <desc id="desc">工具调用前后挂上确定性护栏，稳定性不再只靠模型自觉</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="540" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="496" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">Hooks 事件系统</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">工具调用前后挂上确定性护栏，稳定性不再只靠模型自觉</text>
  <rect x="70" y="126" width="210" height="76" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.6"/>
  <rect x="70" y="126" width="6" height="76" rx="3" fill="#475569" opacity="0.9"/>
  <text class="card-title" x="175.0" y="151" text-anchor="middle" fill="#475569">
    <tspan x="175.0">工具调用请求</tspan>
  </text>
  <text class="card-text" x="175.0" y="174" text-anchor="middle">
    <tspan x="175.0">tool_name + tool_input</tspan>
  </text>
  <line class="arrow" x1="280" y1="164" x2="350" y2="164"/>
  <rect x="350" y="126" width="230" height="76" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="350" y="126" width="6" height="76" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="465.0" y="151" text-anchor="middle" fill="#2563EB">
    <tspan x="465.0">PreToolUse</tspan>
  </text>
  <text class="card-text" x="465.0" y="174" text-anchor="middle">
    <tspan x="465.0">执行前触发 hook</tspan>
  </text>
  <line class="arrow" x1="580" y1="164" x2="660" y2="164"/>
  <polygon points="750,121.0 835.0,164 750,207.0 665.0,164" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.8"/>
  <text class="card-title" x="750" y="160" text-anchor="middle" fill="#D97706">
    <tspan x="750">HookResult</tspan>
  </text>
  <text class="small" x="750" y="180" text-anchor="middle" fill="#64748B">
    <tspan x="750">allow / block / append</tspan>
  </text>
  <line class="arrow-green" x1="750" y1="207" x2="750" y2="262"/>
  <text class="label" x="750.0" y="227.5" text-anchor="middle">allow</text>
  <rect x="620" y="264" width="260" height="76" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="620" y="264" width="6" height="76" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="750.0" y="289" text-anchor="middle" fill="#059669">
    <tspan x="750.0">真实工具执行</tspan>
  </text>
  <text class="card-text" x="750.0" y="312" text-anchor="middle">
    <tspan x="750.0">ReadFile / Bash / Edit 等</tspan>
  </text>
  <line class="arrow-green" x1="620" y1="302" x2="540" y2="302"/>
  <rect x="300" y="264" width="240" height="76" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="300" y="264" width="6" height="76" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="420.0" y="289" text-anchor="middle" fill="#7C3AED">
    <tspan x="420.0">PostToolUse</tspan>
  </text>
  <text class="card-text" x="420.0" y="312" text-anchor="middle">
    <tspan x="420.0">执行后记录或改写结果</tspan>
  </text>
  <line class="arrow" x1="300" y1="302" x2="225" y2="302"/>
  <rect x="70" y="264" width="180" height="76" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="70" y="264" width="6" height="76" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="160.0" y="289" text-anchor="middle" fill="#0891B2">
    <tspan x="160.0">结果回填</tspan>
  </text>
  <text class="card-text" x="160.0" y="312" text-anchor="middle">
    <tspan x="160.0">stdout / stderr / exit_code</tspan>
  </text>
  <path class="arrow-amber" d="M835 164 C925 210 930 365 820 402"/>
  <text class="label" x="900" y="284" text-anchor="middle">block</text>
  <rect x="630" y="392" width="250" height="80" rx="16" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.6"/>
  <rect x="630" y="392" width="6" height="80" rx="3" fill="#E11D48" opacity="0.9"/>
  <text class="card-title" x="755.0" y="417" text-anchor="middle" fill="#E11D48">
    <tspan x="755.0">拦截返回</tspan>
  </text>
  <text class="card-text" x="755.0" y="440" text-anchor="middle">
    <tspan x="755.0">不执行工具；把 reason 写回模型</tspan>
  </text>
  <rect x="70" y="430" width="500" height="62" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="88" y="454" text-anchor="start" fill="#334155">
    <tspan x="88">Hook 的价值</tspan>
  </text>
  <text class="small" x="88" y="478" text-anchor="start">
    <tspan x="88">把“希望模型自觉遵守”变成“每次工具调用都必须经过”的确定性护栏。</tspan>
  </text>
</svg>
