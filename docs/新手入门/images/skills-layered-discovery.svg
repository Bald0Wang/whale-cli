<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">Skills 分层发现与加载</title>
  <desc id="desc">按来源发现、按优先级去重，再把 Skill 索引注入提示词</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="650" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="606" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">Skills 分层发现与加载</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">按来源发现、按优先级去重，再把 Skill 索引注入提示词</text>
  <rect x="70" y="116" width="210" height="86" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="70" y="116" width="6" height="86" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="175.0" y="141" text-anchor="middle" fill="#059669">
    <tspan x="175.0">Project skills</tspan>
  </text>
  <text class="card-text" x="175.0" y="164" text-anchor="middle">
    <tspan x="175.0">项目目录中的 Skill</tspan>
    <tspan x="175.0" dy="15">优先级最高</tspan>
  </text>
  <rect x="395" y="116" width="210" height="86" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="395" y="116" width="6" height="86" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="500.0" y="141" text-anchor="middle" fill="#0891B2">
    <tspan x="500.0">User skills</tspan>
  </text>
  <text class="card-text" x="500.0" y="164" text-anchor="middle">
    <tspan x="500.0">用户主目录下的个人套路</tspan>
  </text>
  <rect x="720" y="116" width="210" height="86" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.6"/>
  <rect x="720" y="116" width="6" height="86" rx="3" fill="#475569" opacity="0.9"/>
  <text class="card-title" x="825.0" y="141" text-anchor="middle" fill="#475569">
    <tspan x="825.0">Builtin skills</tspan>
  </text>
  <text class="card-text" x="825.0" y="164" text-anchor="middle">
    <tspan x="825.0">随项目发布的默认能力</tspan>
  </text>
  <line class="arrow-green" x1="175" y1="202" x2="405" y2="270"/>
  <line class="arrow" x1="500" y1="202" x2="500" y2="270"/>
  <line class="arrow" x1="825" y1="202" x2="595" y2="270"/>
  <rect x="350" y="272" width="300" height="82" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="350" y="272" width="6" height="82" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="500.0" y="297" text-anchor="middle" fill="#2563EB">
    <tspan x="500.0">discover_skills()</tspan>
  </text>
  <text class="card-text" x="500.0" y="320" text-anchor="middle">
    <tspan x="500.0">只读取 frontmatter：name、description、scope</tspan>
  </text>
  <line class="arrow" x1="500" y1="354" x2="500" y2="394"/>
  <rect x="350" y="396" width="300" height="76" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.6"/>
  <rect x="350" y="396" width="6" height="76" rx="3" fill="#D97706" opacity="0.9"/>
  <text class="card-title" x="500.0" y="421" text-anchor="middle" fill="#D97706">
    <tspan x="500.0">去重与优先级</tspan>
  </text>
  <text class="card-text" x="500.0" y="444" text-anchor="middle">
    <tspan x="500.0">project &gt; user &gt; builtin；同名时高优先级先赢</tspan>
  </text>
  <line class="arrow-amber" x1="650" y1="434" x2="720" y2="434"/>
  <rect x="720" y="392" width="210" height="84" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="720" y="392" width="6" height="84" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="825.0" y="417" text-anchor="middle" fill="#7C3AED">
    <tspan x="825.0">Prompt 索引</tspan>
  </text>
  <text class="card-text" x="825.0" y="440" text-anchor="middle">
    <tspan x="825.0">先注入技能列表，不展开全文</tspan>
  </text>
  <path class="arrow" d="M720 470 C610 540 330 535 280 448" stroke-dasharray="6 5"/>
  <text class="label" x="500" y="536" text-anchor="middle">Python 侧可显式读取</text>
  <rect x="70" y="392" width="210" height="84" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="70" y="392" width="6" height="84" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="175.0" y="417" text-anchor="middle" fill="#059669">
    <tspan x="175.0">Skill 正文文件</tspan>
  </text>
  <text class="card-text" x="175.0" y="440" text-anchor="middle">
    <tspan x="175.0">由 read_skill_text() 读取</tspan>
  </text>
  <rect x="70" y="560" width="860" height="54" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="88" y="584" text-anchor="start" fill="#334155">
    <tspan x="88">读图提示</tspan>
  </text>
  <text class="small" x="88" y="608" text-anchor="start">
    <tspan x="88">启动时只把名称、scope、描述放进 system prompt；正文保留在磁盘，需要时由应用显式读取。</tspan>
  </text>
</svg>
