<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">LLM Client 分层架构</title>
  <desc id="desc">配置读取、消息出站、兼容接口调用都收进一个稳定边界</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="620" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="576" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">LLM Client 分层架构</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">配置读取、消息出站、兼容接口调用都收进一个稳定边界</text>
  <rect x="70" y="116" width="190" height="76" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="70" y="116" width="6" height="76" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="165.0" y="141" text-anchor="middle" fill="#059669">
    <tspan x="165.0">环境变量</tspan>
  </text>
  <text class="card-text" x="165.0" y="164" text-anchor="middle">
    <tspan x="165.0">STEP_API_KEY 等优先读取</tspan>
  </text>
  <rect x="310" y="116" width="190" height="76" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="310" y="116" width="6" height="76" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="405.0" y="141" text-anchor="middle" fill="#0891B2">
    <tspan x="405.0">配置文件</tspan>
  </text>
  <text class="card-text" x="405.0" y="164" text-anchor="middle">
    <tspan x="405.0">~/.whale/config.json</tspan>
  </text>
  <rect x="550" y="116" width="190" height="76" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.6"/>
  <rect x="550" y="116" width="6" height="76" rx="3" fill="#D97706" opacity="0.9"/>
  <text class="card-title" x="645.0" y="141" text-anchor="middle" fill="#D97706">
    <tspan x="645.0">交互输入</tspan>
  </text>
  <text class="card-text" x="645.0" y="164" text-anchor="middle">
    <tspan x="645.0">缺省时手动输入</tspan>
  </text>
  <line class="arrow-green" x1="165" y1="192" x2="360" y2="236"/>
  <line class="arrow" x1="405" y1="192" x2="470" y2="236"/>
  <line class="arrow-amber" x1="645" y1="192" x2="580" y2="236"/>
  <rect x="325" y="238" width="350" height="84" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="325" y="238" width="6" height="84" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="500.0" y="263" text-anchor="middle" fill="#2563EB">
    <tspan x="500.0">配置解析 Resolver</tspan>
  </text>
  <text class="card-text" x="500.0" y="286" text-anchor="middle">
    <tspan x="500.0">base_url、model、api_key</tspan>
    <tspan x="500.0" dy="15">max_context_tokens 在这里定型</tspan>
  </text>
  <line class="arrow" x1="500" y1="322" x2="500" y2="360"/>
  <rect x="315" y="362" width="370" height="90" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="315" y="362" width="6" height="90" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="500.0" y="387" text-anchor="middle" fill="#7C3AED">
    <tspan x="500.0">LLMClient.chat(messages, tools)</tspan>
  </text>
  <text class="card-text" x="500.0" y="410" text-anchor="middle">
    <tspan x="500.0">把 messages / tools 转为兼容请求</tspan>
  </text>
  <line class="arrow" x1="685" y1="407" x2="760" y2="407"/>
  <rect x="760" y="362" width="170" height="90" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="760" y="362" width="6" height="90" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="845.0" y="387" text-anchor="middle" fill="#059669">
    <tspan x="845.0">兼容端点</tspan>
  </text>
  <text class="card-text" x="845.0" y="410" text-anchor="middle">
    <tspan x="845.0">Step Plan 等</tspan>
    <tspan x="845.0" dy="15">兼容端点</tspan>
  </text>
  <path class="arrow-green" d="M760 452 C690 520 390 520 315 452"/>
  <text class="label" x="520" y="516" text-anchor="middle">response.choices[0].message</text>
  <rect x="70" y="372" width="190" height="124" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="88" y="396" text-anchor="start" fill="#334155">
    <tspan x="88">出站边界</tspan>
  </text>
  <text class="small" x="88" y="420" text-anchor="start">
    <tspan x="88">发送前只保留 API 字段</tspan>
    <tspan x="88" dy="15">本地 metadata 不会发给模型</tspan>
  </text>
  <rect x="70" y="526" width="860" height="56" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="88" y="550" text-anchor="start" fill="#334155">
    <tspan x="88">本章重点</tspan>
  </text>
  <text class="small" x="88" y="574" text-anchor="start">
    <tspan x="88">Soul 不处理 HTTP、鉴权或厂商差异，只管理 messages、tools 与 assistant 响应。</tspan>
  </text>
</svg>
