<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">工具池统一架构</title>
  <desc id="desc">内置工具、本地插件和 MCP 远端最终都进入同一个 Toolset</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="650" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="606" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">工具池统一架构</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">内置工具、本地插件和 MCP 远端最终都进入同一个 Toolset</text>
  <rect x="55" y="116" width="250" height="110" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="55" y="116" width="6" height="110" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="180.0" y="141" text-anchor="middle" fill="#2563EB">
    <tspan x="180.0">内置工具</tspan>
  </text>
  <text class="card-text" x="180.0" y="164" text-anchor="middle">
    <tspan x="180.0">文件、Bash、Todo、Agent</tspan>
    <tspan x="180.0" dy="15">以及 Background 工具</tspan>
  </text>
  <rect x="375" y="116" width="250" height="110" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="375" y="116" width="6" height="110" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="500.0" y="141" text-anchor="middle" fill="#7C3AED">
    <tspan x="500.0">本地插件</tspan>
  </text>
  <text class="card-text" x="500.0" y="164" text-anchor="middle">
    <tspan x="500.0">plugin.json 声明</tspan>
    <tspan x="500.0" dy="15">动态导入为 Tool</tspan>
  </text>
  <rect x="695" y="116" width="250" height="110" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="695" y="116" width="6" height="110" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="820.0" y="141" text-anchor="middle" fill="#059669">
    <tspan x="820.0">MCP 远端</tspan>
  </text>
  <text class="card-text" x="820.0" y="164" text-anchor="middle">
    <tspan x="820.0">stdio / HTTP / SSE</tspan>
    <tspan x="820.0" dy="15">Adapter 适配为 Tool</tspan>
  </text>
  <line class="arrow" x1="180" y1="226" x2="360" y2="300"/>
  <line class="arrow" x1="500" y1="226" x2="500" y2="300"/>
  <line class="arrow-green" x1="820" y1="226" x2="640" y2="300"/>
  <rect x="300" y="302" width="400" height="94" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.6"/>
  <rect x="300" y="302" width="6" height="94" rx="3" fill="#D97706" opacity="0.9"/>
  <text class="card-title" x="500.0" y="327" text-anchor="middle" fill="#D97706">
    <tspan x="500.0">Unified Toolset</tspan>
  </text>
  <text class="card-text" x="500.0" y="350" text-anchor="middle">
    <tspan x="500.0">统一 name、description、schema</tspan>
    <tspan x="500.0" dy="15">统一 handle() 与结果格式</tspan>
  </text>
  <line class="arrow-amber" x1="500" y1="396" x2="500" y2="462"/>
  <rect x="305" y="464" width="390" height="78" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="305" y="464" width="6" height="78" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="500.0" y="489" text-anchor="middle" fill="#0891B2">
    <tspan x="500.0">模型看到的世界</tspan>
  </text>
  <text class="card-text" x="500.0" y="512" text-anchor="middle">
    <tspan x="500.0">模型只看到可调用工具及参数 schema</tspan>
  </text>
  <rect x="80" y="568" width="840" height="54" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="98" y="592" text-anchor="start" fill="#334155">
    <tspan x="98">命名规范</tspan>
  </text>
  <text class="small" x="98" y="616" text-anchor="start">
    <tspan x="98">内置工具直接用功能名；plugin__... 与 mcp__... 保留来源前缀。名字不同，调度入口保持统一。</tspan>
  </text>
</svg>
