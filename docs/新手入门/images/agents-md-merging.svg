<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 610" role="img" aria-labelledby="title desc">
  <title id="title">AGENTS.md 逐层合并</title>
  <desc id="desc">仓库规则自动进入 system prompt，让模型先知道项目约束</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="610" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="566" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">AGENTS.md 逐层合并</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">仓库规则自动进入 system prompt，让模型先知道项目约束</text>
  <rect x="70" y="110" width="220" height="78" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.6"/>
  <rect x="70" y="110" width="6" height="78" rx="3" fill="#475569" opacity="0.9"/>
  <text class="card-title" x="180.0" y="135" text-anchor="middle" fill="#475569">
    <tspan x="180.0">仓库根目录</tspan>
  </text>
  <text class="card-text" x="180.0" y="158" text-anchor="middle">
    <tspan x="180.0">AGENTS.md：全局规则</tspan>
  </text>
  <line class="arrow" x1="290" y1="149" x2="365" y2="149"/>
  <rect x="365" y="110" width="220" height="78" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="365" y="110" width="6" height="78" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="475.0" y="135" text-anchor="middle" fill="#2563EB">
    <tspan x="475.0">子目录</tspan>
  </text>
  <text class="card-text" x="475.0" y="158" text-anchor="middle">
    <tspan x="475.0">AGENTS.md：模块规则</tspan>
  </text>
  <line class="arrow" x1="585" y1="149" x2="660" y2="149"/>
  <rect x="660" y="110" width="220" height="78" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="660" y="110" width="6" height="78" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="770.0" y="135" text-anchor="middle" fill="#059669">
    <tspan x="770.0">当前工作目录</tspan>
  </text>
  <text class="card-text" x="770.0" y="158" text-anchor="middle">
    <tspan x="770.0">更贴近任务的规则</tspan>
  </text>
  <line class="arrow" x1="180" y1="188" x2="500" y2="254"/>
  <line class="arrow" x1="475" y1="188" x2="500" y2="254"/>
  <line class="arrow-green" x1="770" y1="188" x2="500" y2="254"/>
  <rect x="340" y="256" width="320" height="84" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="340" y="256" width="6" height="84" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="500.0" y="281" text-anchor="middle" fill="#7C3AED">
    <tspan x="500.0">发现候选文件</tspan>
  </text>
  <text class="card-text" x="500.0" y="304" text-anchor="middle">
    <tspan x="500.0">从工作目录向上查找；保留 root 到 leaf 顺序</tspan>
  </text>
  <line class="arrow" x1="500" y1="340" x2="500" y2="390"/>
  <rect x="340" y="392" width="320" height="84" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.6"/>
  <rect x="340" y="392" width="6" height="84" rx="3" fill="#D97706" opacity="0.9"/>
  <text class="card-title" x="500.0" y="417" text-anchor="middle" fill="#D97706">
    <tspan x="500.0">预算裁剪</tspan>
  </text>
  <text class="card-text" x="500.0" y="440" text-anchor="middle">
    <tspan x="500.0">max_bytes 内优先保留 leaf 规则</tspan>
  </text>
  <line class="arrow-amber" x1="660" y1="434" x2="735" y2="434"/>
  <rect x="735" y="392" width="180" height="84" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="735" y="392" width="6" height="84" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="825.0" y="417" text-anchor="middle" fill="#059669">
    <tspan x="825.0">system prompt</tspan>
  </text>
  <text class="card-text" x="825.0" y="440" text-anchor="middle">
    <tspan x="825.0">启动前注入项目上下文</tspan>
  </text>
  <path class="arrow" d="M340 434 C230 460 150 415 180 188" stroke-dasharray="6 5"/>
  <text class="label" x="230" y="458" text-anchor="middle">全局规则仍保留</text>
  <rect x="70" y="520" width="850" height="58" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="88" y="544" text-anchor="start" fill="#334155">
    <tspan x="88">合并原则</tspan>
  </text>
  <text class="small" x="88" y="568" text-anchor="start">
    <tspan x="88">先全局再局部，局部更具体；当预算不够时优先保留离当前任务最近的规则。</tspan>
  </text>
</svg>
