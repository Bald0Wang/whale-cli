<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">上下文压缩流程</title>
  <desc id="desc">长历史变成摘要，最近细节保留，Agent Loop 继续推进</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="640" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="596" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">上下文压缩流程</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">长历史变成摘要，最近细节保留，Agent Loop 继续推进</text>
  <rect x="60" y="120" width="210" height="76" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.6"/>
  <rect x="60" y="120" width="6" height="76" rx="3" fill="#475569" opacity="0.9"/>
  <text class="card-title" x="165.0" y="145" text-anchor="middle" fill="#475569">
    <tspan x="165.0">messages</tspan>
  </text>
  <text class="card-text" x="165.0" y="168" text-anchor="middle">
    <tspan x="165.0">完整会话历史</tspan>
  </text>
  <line class="arrow" x1="270" y1="158" x2="350" y2="158"/>
  <rect x="350" y="120" width="220" height="76" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="350" y="120" width="6" height="76" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="460.0" y="145" text-anchor="middle" fill="#2563EB">
    <tspan x="460.0">token 估算</tspan>
  </text>
  <text class="card-text" x="460.0" y="168" text-anchor="middle">
    <tspan x="460.0">判断是否接近窗口上限</tspan>
  </text>
  <line class="arrow" x1="570" y1="158" x2="650" y2="158"/>
  <polygon points="740,115.0 825.0,158 740,201.0 655.0,158" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.8"/>
  <text class="card-title" x="740" y="154" text-anchor="middle" fill="#D97706">
    <tspan x="740">超过阈值?</tspan>
  </text>
  <text class="small" x="740" y="174" text-anchor="middle" fill="#64748B">
    <tspan x="740">85% 预算</tspan>
  </text>
  <line class="arrow-amber" x1="740" y1="201" x2="740" y2="256"/>
  <text class="label" x="740.0" y="221.5" text-anchor="middle">YES</text>
  <rect x="600" y="258" width="280" height="78" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="600" y="258" width="6" height="78" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="740.0" y="283" text-anchor="middle" fill="#7C3AED">
    <tspan x="740.0">compact prompt</tspan>
  </text>
  <text class="card-text" x="740.0" y="306" text-anchor="middle">
    <tspan x="740.0">要求输出当前目标、完成项、问题、代码状态</tspan>
  </text>
  <line class="arrow" x1="600" y1="297" x2="520" y2="297"/>
  <rect x="280" y="258" width="240" height="78" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="280" y="258" width="6" height="78" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="400.0" y="283" text-anchor="middle" fill="#059669">
    <tspan x="400.0">旧消息摘要</tspan>
  </text>
  <text class="card-text" x="400.0" y="306" text-anchor="middle">
    <tspan x="400.0">把长历史压成结构化说明</tspan>
  </text>
  <line class="arrow-green" x1="400" y1="336" x2="400" y2="390"/>
  <rect x="260" y="392" width="280" height="78" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="260" y="392" width="6" height="78" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="400.0" y="417" text-anchor="middle" fill="#059669">
    <tspan x="400.0">summary message</tspan>
  </text>
  <text class="card-text" x="400.0" y="440" text-anchor="middle">
    <tspan x="400.0">作为新的上下文锚点</tspan>
  </text>
  <rect x="610" y="392" width="250" height="78" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="610" y="392" width="6" height="78" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="735.0" y="417" text-anchor="middle" fill="#0891B2">
    <tspan x="735.0">最近消息</tspan>
  </text>
  <text class="card-text" x="735.0" y="440" text-anchor="middle">
    <tspan x="735.0">保留当前操作细节</tspan>
  </text>
  <line class="arrow-green" x1="540" y1="431" x2="610" y2="431"/>
  <line class="arrow" x1="685" y1="470" x2="500" y2="530"/>
  <line class="arrow-green" x1="400" y1="470" x2="500" y2="530"/>
  <rect x="375" y="532" width="250" height="70" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="375" y="532" width="6" height="70" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="500.0" y="557" text-anchor="middle" fill="#2563EB">
    <tspan x="500.0">压缩后继续循环</tspan>
  </text>
  <text class="card-text" x="500.0" y="580" text-anchor="middle">
    <tspan x="500.0">少 token，但保留任务状态</tspan>
  </text>
  <path class="arrow" d="M825 158 C900 210 900 520 625 565" stroke-dasharray="6 5"/>
  <text class="label" x="875" y="350" text-anchor="middle">NO：直接继续</text>
</svg>
