<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">Background Task 状态机</title>
  <desc id="desc">慢任务后台执行，主对话继续响应，状态与输出随时可查</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="540" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="496" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">Background Task 状态机</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">慢任务后台执行，主对话继续响应，状态与输出随时可查</text>
  <rect x="70" y="130" width="210" height="78" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="70" y="130" width="6" height="78" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="175.0" y="155" text-anchor="middle" fill="#2563EB">
    <tspan x="175.0">BackgroundStart</tspan>
  </text>
  <text class="card-text" x="175.0" y="178" text-anchor="middle">
    <tspan x="175.0">提交慢命令并立即返回 task_id</tspan>
  </text>
  <line class="arrow" x1="280" y1="169" x2="350" y2="169"/>
  <rect x="350" y="130" width="210" height="78" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.6"/>
  <rect x="350" y="130" width="6" height="78" rx="3" fill="#475569" opacity="0.9"/>
  <text class="card-title" x="455.0" y="155" text-anchor="middle" fill="#475569">
    <tspan x="455.0">created</tspan>
  </text>
  <text class="card-text" x="455.0" y="178" text-anchor="middle">
    <tspan x="455.0">生成 TaskSpec；写入存储</tspan>
  </text>
  <line class="arrow" x1="560" y1="169" x2="630" y2="169"/>
  <rect x="630" y="130" width="250" height="78" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.6"/>
  <rect x="630" y="130" width="6" height="78" rx="3" fill="#D97706" opacity="0.9"/>
  <text class="card-title" x="755.0" y="155" text-anchor="middle" fill="#D97706">
    <tspan x="755.0">running</tspan>
  </text>
  <text class="card-text" x="755.0" y="178" text-anchor="middle">
    <tspan x="755.0">后台线程执行，不阻塞 REPL</tspan>
  </text>
  <line class="arrow-green" x1="755" y1="208" x2="755" y2="270"/>
  <text class="label" x="755.0" y="232.0" text-anchor="middle">完成</text>
  <rect x="625" y="272" width="120" height="64" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="625" y="272" width="6" height="64" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="685.0" y="297" text-anchor="middle" fill="#059669">
    <tspan x="685.0">completed</tspan>
  </text>
  <text class="card-text" x="685.0" y="320" text-anchor="middle">
    <tspan x="685.0">exit_code=0</tspan>
  </text>
  <rect x="765" y="272" width="120" height="64" rx="16" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.6"/>
  <rect x="765" y="272" width="6" height="64" rx="3" fill="#E11D48" opacity="0.9"/>
  <text class="card-title" x="825.0" y="297" text-anchor="middle" fill="#E11D48">
    <tspan x="825.0">failed</tspan>
  </text>
  <text class="card-text" x="825.0" y="320" text-anchor="middle">
    <tspan x="825.0">非 0 或异常</tspan>
  </text>
  <line class="arrow-amber" x1="812" y1="208" x2="825" y2="270"/>
  <text class="label" x="818.5" y="232.0" text-anchor="middle">失败</text>
  <rect x="70" y="300" width="250" height="76" rx="16" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.6"/>
  <rect x="70" y="300" width="6" height="76" rx="3" fill="#0891B2" opacity="0.9"/>
  <text class="card-title" x="195.0" y="325" text-anchor="middle" fill="#0891B2">
    <tspan x="195.0">BackgroundList</tspan>
  </text>
  <text class="card-text" x="195.0" y="348" text-anchor="middle">
    <tspan x="195.0">查看所有任务状态</tspan>
  </text>
  <rect x="70" y="400" width="250" height="76" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="70" y="400" width="6" height="76" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="195.0" y="425" text-anchor="middle" fill="#7C3AED">
    <tspan x="195.0">BackgroundOutput</tspan>
  </text>
  <text class="card-text" x="195.0" y="448" text-anchor="middle">
    <tspan x="195.0">按 task_id 读取 stdout / stderr</tspan>
  </text>
  <rect x="400" y="368" width="260" height="84" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="400" y="368" width="6" height="84" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="530.0" y="393" text-anchor="middle" fill="#059669">
    <tspan x="530.0">TaskStore</tspan>
  </text>
  <text class="card-text" x="530.0" y="416" text-anchor="middle">
    <tspan x="530.0">状态、输出、失败原因都落盘</tspan>
  </text>
  <line class="arrow" x1="320" y1="338" x2="400" y2="398"/>
  <line class="arrow" x1="320" y1="438" x2="400" y2="424"/>
  <path class="arrow-green" d="M630 190 C530 260 530 325 530 368" stroke-dasharray="6 5"/>
  <text class="label" x="548" y="300" text-anchor="middle">持续更新</text>
  <rect x="690" y="390" width="210" height="76" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="708" y="414" text-anchor="start" fill="#334155">
    <tspan x="708">适合后台跑</tspan>
  </text>
  <text class="small" x="708" y="438" text-anchor="start">
    <tspan x="708">测试、构建、长搜索、批处理；不适合</tspan>
    <tspan x="708" dy="15">需要频繁交互的命令。</tspan>
  </text>
</svg>
