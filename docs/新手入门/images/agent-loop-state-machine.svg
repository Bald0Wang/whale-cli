<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent Loop v0 状态机</title>
  <desc id="desc">模型决策、工具执行、观察回填和退出条件在同一张图里闭合</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#D97706"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#172033; }
      .subtitle { font: 400 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#526174; }
      .card-title { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
      .card-text { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#40516A; }
      .small { font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#5B6B80; }
      .label { font: 700 11px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { fill:none; stroke:#2563EB; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowBlue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowGreen); }
      .arrow-amber { fill:none; stroke:#D97706; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; marker-end:url(#arrowAmber); }
      .muted-line { fill:none; stroke:#CBD5E1; stroke-width:1.4; stroke-dasharray:5 5; }
    ]]></style>
  </defs>
  <rect width="1000" height="620" rx="24" fill="#F7FAFC"/>
  <rect x="24" y="22" width="952" height="576" rx="22" fill="#FFFFFF" stroke="#D9E4F2" filter="url(#cardShadow)"/>
  <text class="title" x="500" y="54" text-anchor="middle">Agent Loop v0 状态机</text>
  <text class="subtitle" x="500" y="78" text-anchor="middle">模型决策、工具执行、观察回填和退出条件在同一张图里闭合</text>
  <rect x="55" y="116" width="170" height="70" rx="16" fill="#172033" stroke="#172033" stroke-width="1.6"/>
  <rect x="55" y="116" width="6" height="70" rx="3" fill="#38BDF8" opacity="0.95"/>
  <text class="card-title" x="140" y="141" text-anchor="middle" fill="#FFFFFF">
    <tspan x="140">System Prompt</tspan>
  </text>
  <text class="small" x="140" y="164" text-anchor="middle" fill="#CBD5E1">
    <tspan x="140">角色、工具、规则</tspan>
  </text>
  <line class="arrow" x1="225" y1="151" x2="270" y2="151"/>
  <rect x="270" y="116" width="170" height="70" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="270" y="116" width="6" height="70" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="355.0" y="141" text-anchor="middle" fill="#2563EB">
    <tspan x="355.0">User Input</tspan>
  </text>
  <text class="card-text" x="355.0" y="164" text-anchor="middle">
    <tspan x="355.0">追加到 messages</tspan>
  </text>
  <line class="arrow" x1="440" y1="151" x2="488" y2="151"/>
  <rect x="488" y="116" width="210" height="70" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.6"/>
  <rect x="488" y="116" width="6" height="70" rx="3" fill="#7C3AED" opacity="0.9"/>
  <text class="card-title" x="593.0" y="141" text-anchor="middle" fill="#7C3AED">
    <tspan x="593.0">LLM.chat()</tspan>
  </text>
  <text class="card-text" x="593.0" y="164" text-anchor="middle">
    <tspan x="593.0">模型基于历史决策</tspan>
  </text>
  <line class="arrow" x1="698" y1="151" x2="748" y2="151"/>
  <polygon points="830,108.0 905.0,151 830,194.0 755.0,151" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.8"/>
  <text class="card-title" x="830" y="147" text-anchor="middle" fill="#D97706">
    <tspan x="830">有工具调用?</tspan>
  </text>
  <text class="small" x="830" y="167" text-anchor="middle" fill="#64748B">
    <tspan x="830">tool_calls</tspan>
  </text>
  <line class="arrow-green" x1="830" y1="194" x2="830" y2="252"/>
  <text class="label" x="830.0" y="216.0" text-anchor="middle">YES</text>
  <rect x="700" y="254" width="260" height="74" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="700" y="254" width="6" height="74" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="830.0" y="279" text-anchor="middle" fill="#059669">
    <tspan x="830.0">Toolset.handle()</tspan>
  </text>
  <text class="card-text" x="830.0" y="302" text-anchor="middle">
    <tspan x="830.0">审批、执行、标准化结果</tspan>
  </text>
  <line class="arrow-green" x1="830" y1="328" x2="830" y2="382"/>
  <rect x="700" y="384" width="260" height="74" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.6"/>
  <rect x="700" y="384" width="6" height="74" rx="3" fill="#059669" opacity="0.9"/>
  <text class="card-title" x="830.0" y="409" text-anchor="middle" fill="#059669">
    <tspan x="830.0">回填 tool result</tspan>
  </text>
  <text class="card-text" x="830.0" y="432" text-anchor="middle">
    <tspan x="830.0">role=tool + result content</tspan>
  </text>
  <path class="arrow-green" d="M700 421 C540 472 320 420 355 186" stroke-dasharray="6 5"/>
  <text class="label" x="470" y="454" text-anchor="middle">继续循环</text>
  <text class="label" x="924.0" y="144.0" text-anchor="middle">NO</text>
  <rect x="795" y="470" width="165" height="58" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.6"/>
  <rect x="795" y="470" width="6" height="58" rx="3" fill="#2563EB" opacity="0.9"/>
  <text class="card-title" x="877.5" y="495" text-anchor="middle" fill="#2563EB">
    <tspan x="877.5">输出答案</tspan>
  </text>
  <text class="card-text" x="877.5" y="518" text-anchor="middle">
    <tspan x="877.5">assistant.content</tspan>
  </text>
  <path class="arrow" d="M905 151 H970 V499 H960"/>
  <rect x="55" y="242" width="250" height="110" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="73" y="266" text-anchor="start" fill="#334155">
    <tspan x="73">退出条件</tspan>
  </text>
  <text class="small" x="73" y="290" text-anchor="start">
    <tspan x="73">max_steps；用户暂停；模型请求失败；或模型</tspan>
    <tspan x="73" dy="15">不再返回 tool_calls。</tspan>
  </text>
  <rect x="55" y="386" width="250" height="112" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="73" y="410" text-anchor="start" fill="#334155">
    <tspan x="73">核心数据</tspan>
  </text>
  <text class="small" x="73" y="434" text-anchor="start">
    <tspan x="73">messages 是循环记忆；内部可带 timestamp</tspan>
    <tspan x="73" dy="15">和 metadata，发给模型前再投影。</tspan>
  </text>
  <rect x="55" y="526" width="640" height="58" rx="14" fill="#F8FAFC" stroke="#D8E1EE"/>
  <text class="card-title" x="73" y="550" text-anchor="start" fill="#334155">
    <tspan x="73">控制点</tspan>
  </text>
  <text class="small" x="73" y="574" text-anchor="start">
    <tspan x="73">每轮都要能推进，也要能停下。工具结果必须回填，否则下一轮无法基于观察调整。</tspan>
  </text>
</svg>
